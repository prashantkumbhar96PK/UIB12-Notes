<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fieldset Form</title>
</head>
<body>
    <form action="">
        <h1>Student Registration Form</h1>
        <fieldset>
            <legend>Personal Information</legend>
            <label for="name">Name</label>
            <input type="text" id="name" name="studentName">
            <br><br>
            <label for="contact">Contact No</label>
            <input type="tel" name="mobno" id="contact">


        </fieldset>
        <fieldset>
            <legend>Identification details</legend>
            <label for="adhar">Adhar No</label>
            <input type="text" id="adhar" name="adharNo">
            <br><br>
                  <label for="pan">Pan No</label>
            <input type="text" id="pan" name="panNo">


        </fieldset>


        
    </form>
    
</body>
</html>
