<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Student Registration Form</title>
    <style>
      span{
        color: red;
        font-weight: bold;
      }
    </style>
</head>
<body>
    <form action="" method="">
         <h1>Student Registration Form</h1>
         <label for="rollno">Rollno</label>
          <input type="text" id="rollno" name="stuRollNo" >
          <br><br>
          <label for="name">Name</label>
          <input type="text" id="name" name="stuName" value="akash" readonly >
          <br><br>
            <label for="mobno">Mobile No</label>
            <input type="tel" id="mobno" name="mobileno" pattern="[6789][0-9]{9}">
          <br><br>
           <label for="age">Age</label> 
          <input type="number" id="age" name="stuAge" hidden>
          <br><br>
          <label for="mail">Email <span>*</span></label>
          <input type="email" id="mail" name="stuMail" placeholder="xyz@gmail.com"  >
          <br><br>
          <label for="pass">Password <span>*</span> </label>
          <input type="password" name="password" id="pass" >
          <br><br>
          <label for="gender">Gender</label>
          <input type="radio" name="gender" id="male" value="male"> <label for="male">Male</label>
          <input type="radio" name="gender" id="female" value="female"> <label for="female">Female</label>
            <br><br>
            <label for="courses">Intrested Courses</label>
            <input type="checkbox" id="java" name="courses" value="java"> <label for="java">Java</label>
            <input type="checkbox"  id="python" name="courses" value="python"><label for="python">Python</label>
            <input type="checkbox"  id="mern" name="courses" value="mern"><label for="mern">MERN</label>
          <br><br>
          <label for="city">City</label>
          <select id="city" name="city">
            <option value="karvenagar">Karvenagar</option>
            <option value="warje">Warje</option>
              <option value="kothrud" selected>Kothrud</option>
            <option value="shivane">Shivane</option>

          </select>
          <br><br>
          <label for="dob">Date Of Birth</label>
          <input type="datetime-local">
             <br><br>
             <label for="addr">Address</label>
            <textArea rows="5" cols="8"></textArea>
             <br><br>
            <label for="mark">Marks</label>
            <input type="range" name="marks" id="mark" min="0" max="100" step="25">
             <br><br>
             <label for="docs">Upload Resume</label>
             <input type="file" name="documents" id="docs" multiple accept=".pdf,.docx">
             <br><br>
             
          <button type="submit">Submit</button>
          <button type="reset">Clear</button>
    
    </form>

    
</body>
</html>
