    // Arithmetic Operators
    console.log(10+2);
    console.log(10-2);
    console.log(10*2);
    console.log(10/2);
    console.log(11%2);
    console.log(5**3); // exponentian

    let a=5;
    console.log(++a);

    let b=5;
    console.log(b++);

    let c=5;
    console.log(--c);
    

    let d=5;
    console.log(d--);

    // Assignment Operators
  let a1=5;
  a1+=5;  // a1=a1+5;
  a1-=5;  // a1=a1-5;

  a1/=5;   // a1=a1/5
  a1%=2;   // a1=a1%2
  a1**=3;   // a1=a1**3

  //Comparison Operators / Relational Operators
  let x1="20";
  let y1=20;

  console.log(x1==y1);
  console.log(x1===y1);

  let x=20;
  let y=20;
  console.log(x!=y);
  console.log(x>y);
  console.log(x<y);
  console.log(x>=y);
  console.log(x<=y);

  //Logical operators

  console.log(20==20 &&  10<=20 && 15>=15);
  console.log(20>=20 || 10==20 || 14>=15);

   console.log(!20>=20 || 10==20 || 14>=15);
  
  // Type Operators
  let num=20;
  console.log(typeof num);

  let n=[10,20,30];
  console.log(n instanceof Object);
