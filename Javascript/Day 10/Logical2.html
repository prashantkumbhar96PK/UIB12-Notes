// Armstrong Number 153= 3 dig= 1^3 + 5^3 + 3^3 =1+125+27=153

let num=153;
let digit=num.toString().length;
let temp=num;
let sum=0;
while(temp>0)
{
  let rem=temp%10;
  sum=sum+Math.pow(rem,digit);
  temp=Math.floor(temp/10);
}

if(num===sum)
{
  console.log(`The ${num} is Armstrong number`);
  
}
else{
 console.log(`The ${num} is Not an Armstrong number`);
