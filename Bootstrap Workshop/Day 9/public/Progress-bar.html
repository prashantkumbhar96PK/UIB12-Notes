<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Progress Bar</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body class="container-fluid">
    <h2>HTML Progress bar</h2>
        <progress min="1" max="100" value="20"></progress>20% completed


         <h2>Bootstrap Progress bar</h2>
   <div class="progress">
      <div class="progress-bar bg-success progress-bar-striped progress-bar-animated">25% completed</div>
   </div>
   <br>
    <div class="progress">
      <div class="progress-bar bg-success progress-bar-striped progress-bar-animated" style="width: 25%;">25% completed</div>
      <div class="progress-bar bg-danger progress-bar-striped" style="width: 75%;">75% remaining</div>
   </div>
  </body>
</html>
