<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alert Form</title>
   <!-- Bootstrap CDN Links -->
                            <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
                            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
                            <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
   

  </head>
  <body    class="container-fluid d-flex justify-content-center align-items-center">
  

    <form action="" class="alert alert-warning alert-dismissible">
        <h3 class="bi bi-person-fill">User Login Form</h3>
        <button class="btn btn-close" data-bs-dismiss="alert"></button>
        <dl>
            <dt>
                UserName
            </dt>
            <dd>
                <input type="text" >
            </dd>
            <dt>
                Password
            </dt>
            <dd><input type="password" ></dd>
        </dl>
        <button class="btn btn-warning w-100">Login</button>
    </form>
  </body>
</html>
