<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fading Text</title>
    <style>
        .text{
            font-size: 50px;
            font-weight: bold;
            color: blue;
            animation: fade 3s 5;
        }
        @keyframes fade{
            0%{opacity: 1;}
            50%{opacity: 0;}
            100%{opacity: 1;}
        }
    </style>
</head>
<body>
     <div class="text">Fading Text Effect in CSS</div>
</body>
</html>
