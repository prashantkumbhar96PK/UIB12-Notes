<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation in CSS</title>
    <style>
        .box{
            width: 100px;
            height: 100px;
            background-color: tomato;
            border: 3px solid black;
            animation-name: slide;
            animation-duration: 10s;
            /* animation-delay: 1s; */
            animation-iteration-count:infinite;
            animation-timing-function: ease-in-out;
            /* animation-direction: alternate-reverse; */
        }
        @keyframes slide{
            /* from {transform:translateX(0px);}
            to {transform:translateX(800px);} */
            0% {transform: translateX(0px);background-color: tomato;}
            25%{transform:translateX(600px);background-color: blue;}
            /* 50%{transform:translateX(600px) translateY(500px);} */
           50%{transform:translate(600px,500px);background-color: green;}
           75%{transform: translate(0px,500px);background-color: deeppink;}
            100% {transform: translate(0px);background-color: tomato;}
        }




    </style>
</head>
<body>
    <div class="box">

    </div>
    
</body>
</html>
