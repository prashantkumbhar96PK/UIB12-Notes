<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Units and Display Property</title>
    <style>
      .child1 {
        background-color: blueviolet;

        width: 100px;
        height: 100px;
        display: inline-block;
      }
      .child2 {
        background-color: brown;

        width: 100px;
        height: 100px;
        display: inline-block;
      }
      .child3 {
        background-color: chartreuse;

        width: 100px;
        height: 100px;
        display: inline-block;
      }
      span {
        display: block;
        width: 500px;
        background-color: blue;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="child1">child-1</div>
      <div class="child2">child-2</div>
      <div class="child3">Child-3</div>
    </div>
    <span>span 1</span>
    <span>span 2</span>
    <span>span 3</span>
  </body>
</html>
